# proof_dag_concepts.yaml
#
# Maps low-level Dafny/Lean lemma names to high-level concept nodes for the
# proof narrative DAG.  Each entry specifies:
#
#   label:   display label inside the Mermaid node
#   class:   optional Mermaid classDef override (mathlib, algo, unproved, …)
#            if omitted, class is inferred from axiom status + prover
#   members: list of Dafny or Lean lemma/theorem names that belong to this concept
#
# Run:
#   python scripts/generate_proof_dag.py --concepts scripts/proof_dag_concepts.yaml
#   python scripts/generate_proof_dag.py --concepts scripts/proof_dag_concepts.yaml \
#       --output docs/high-level-dag.md

concepts:
  K:
    label: "Kolmogorov Axioms\nnon-negativity · normalization · additivity\nD: 1/3 proved · L: Mathlib PMF type"
    class: mathlib
    members:
      - pmf_apply_nonneg
      - pmf_tsum_one
      - pmf_additivity
      - Axiom_NonNegativity
      - Axiom_Normalization
      - Axiom_Additivity

  PMF:
    label: "PMF well-formedness\npmf_tsum_one · pmf_additivity"
    members:
      - PMF
      - PMFWellFormed
      - pmf_well_formed
      - PMF_tsum_one
      - PMF_additivity

  PROD:
    label: "Product PMF\npmfProd_tsum_one"
    members:
      - pmfProd_tsum_one
      - ProductPMF
      - productPMF_tsum_one

  TRUNC:
    label: "TruncatePMF\ndo-operator\ntruncatePMF_tsum_one"
    members:
      - TruncatePMF
      - truncatePMF_tsum_one
      - TruncatePMF_tsum_one

  MARKOV:
    label: "Markov Factorization\nP = ∏ P(Vᵢ | Pa(Vᵢ))"
    members:
      - MarkovFactorization
      - MarkovFactorization_IsDistribution
      - markovFactorization
      - Markov_Factorization

  REACH:
    label: "Graph Reachability Axioms\nBFS ancestors/descendants\nAncestorsCompiled_Correct (D: axiom)"
    members:
      - AncestorsCompiled_Correct
      - DescendantsCompiled_Correct
      - AncestorsCompiled
      - DescendantsCompiled
      - ReachableBFS
      - ReachableParentBFS
      # BFS correctness helpers (exclusively support REACH)
      - AncestorsCompiled_Complete
      - AncestorsCompiled_Sound
      - BFSForwardInvariant_Apply
      - BFSInvariant_Apply
      - Children_InNodes
      - DescendantsCompiled_Complete
      - DescendantsCompiled_Sound
      - IsAncestorBounded_EndInNodes
      - IsAncestorBounded_ExtractPath
      - IsAncestorBounded_StartInNodes
      - IsAncestorBounded_TopoTight
      - IsAncestor_DAGTight
      - IsDAG_ParentsInNodes
      - IsParentPath_Prefix
      - ReachableBFS_FollowsFreshChildPath
      - ReachableBFS_InNodes
      - ReachableBFS_Mono
      - ReachableBFS_Sound
      - ReachableBFS_VisitedSubset
      - ReachableParentBFS_FollowsFreshParentPath
      - ReachableParentBFS_InNodes
      - ReachableParentBFS_Mono
      - ReachableParentBFS_Sound
      - ReachableParentBFS_VisitedSubset
      - SeqIndex_NoDup_Unique
      - TopoSort_ParentBefore
      # Shared with ANC/LMARKOV — belongs here as the upstream concept
      - TopologicalSort_Length
      # IsTopologicalSort predicate: used by BFS correctness (REACH) and KAHN_PROOF
      # — belongs in REACH as it is the more upstream concept
      - IsTopologicalSort
      # Abstract ancestor/descendant definitions called by BFS correctness proofs
      - Ancestors
      - Descendants
      - IsAncestorBounded_Monotone
      - IsAncestorBounded_Transitive

  KAHN_ALGO:
    label: "Kahn's Algorithm\nkahnSort · KahnAux"
    class: algo
    members:
      - kahnSort
      - KahnAux
      - KahnsAlgorithm
      - KahnSort
      - FilterSort_NoDup
      - FilterSort_Contains
      - InDegree
