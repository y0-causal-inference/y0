  T4:
    label: "Theorem 4: Do-Calculus Completeness\nTheorem4_DoCalculusCompleteness"
    members:
      - Theorem4_DoCalculusCompleteness

# ---------------------------------------------------------------------------
# Semantic edges: hand-specified conceptual dependencies that are not always
# captured by literal proof-call analysis.  Format: "- FROM --> TO"
# ---------------------------------------------------------------------------
extra_edges:
  # Probability foundation
  - K --> PMF
  - PMF --> PROD
  - PMF --> TRUNC
  - TRUNC --> MARKOV
  - MARKOV --> GM
  # Graph structure
  - REACH --> KAHN_ALGO
  - REACH --> ANC
  - KAHN_ALGO --> KAHN_PROOF
  - KAHN_PROOF --> ANC
  - ANC --> CCOMP
  # D-separation / semi-graphoid (independent of each other, rooted in graph)
  - REACH --> LMARKOV
  - REACH --> SYM
  - REACH --> DEC
  - REACH --> WU
  - WU --> CONT
  - CONT --> INTER
  # Global Markov follows from local Markov + semi-graphoid axioms
  - LMARKOV --> GM
  - SYM --> GM
  - DEC --> GM
  - WU --> GM
  # Do-calculus
  - GM --> R1
  - GM --> R2
  - GM --> R3
  - R1 --> BKD
  - R2 --> BKD
  - R1 --> FRD
  - R2 --> FRD
  - R3 --> FRD
  # ID algorithm
  - R1 --> ID
  - R2 --> ID
  - R3 --> ID
  - L2 --> ID
  - L3L --> ID
  - MARKOV --> L2
  - KAHN_PROOF --> L2
  - CCOMP --> L2
  - CCOMP --> L3L
  # Soundness / completeness theorems
  - ID --> T2
  - ID --> T3
  - L1 --> T3
  - T2 --> T4
  - T3 --> T4
